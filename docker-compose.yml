services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: golang_microservices
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d golang_microservices"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=yes
      - KAFKA_CFG_NUM_PARTITIONS=3
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
    environment:
      APP_HTTP_ADDR: ":8080"
      APP_LOG_LEVEL: "info"
      APP_DATABASE_URL: "postgres://postgres:postgres@postgres:5432/golang_microservices?sslmode=disable"
      APP_REDIS_ADDR: "redis:6379"
      APP_KAFKA_BROKERS: "kafka:9092"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
    environment:
      APP_HTTP_ADDR: ":8081"
      APP_LOG_LEVEL: "info"
      APP_DATABASE_URL: "postgres://postgres:postgres@postgres:5432/golang_microservices?sslmode=disable"
      APP_AUTH_JWT_SECRET: "dev-auth-secret"
      APP_AUTH_ACCESS_TOKEN_TTL_MINUTES: "60"
      APP_AUTH_REFRESH_TOKEN_TTL_HOURS: "168"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: user-service
    environment:
      APP_HTTP_ADDR: ":8082"
      APP_LOG_LEVEL: "info"
      APP_DATABASE_URL: "postgres://postgres:postgres@postgres:5432/golang_microservices?sslmode=disable"
      APP_USER_API_KEY_ENCRYPTION_KEY: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

  market-data-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: market-data-service
    environment:
      APP_HTTP_ADDR: ":8083"
      APP_LOG_LEVEL: "info"
      APP_KAFKA_BROKERS: "kafka:9092"
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_started

  strategy-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: strategy-service
    environment:
      APP_HTTP_ADDR: ":8084"
      APP_LOG_LEVEL: "info"
      APP_KAFKA_BROKERS: "kafka:9092"
    ports:
      - "8084:8084"
    depends_on:
      kafka:
        condition: service_started

volumes:
  postgres_data:
